<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="wrapper">
        <div class="calculator">
          <div class="screen">
            <input
              class="display"
              id="expression"
              type="text"
              size="15"
              readonly
              autofocus
              maxlength="15"
            />
            <span id="result-display"></span>
          </div>
          <div><button class="erase">&#9003;</button></div>
          <hr class="horizontal-line" />
          <div class="buttons-wrapper">
            <button class="round-btn red-btn" id="clear-btn">C</button>
            <button class="round-btn orange-btn" id="brackets">( )</button>
            <button class="round-btn orange-btn" id="percent" data-value="%">
              %
            </button>
            <button class="round-btn orange-btn operator" data-value="&divide;">
              &divide;
            </button>

            <button class="round-btn number-btn" data-value="7">7</button>
            <button class="round-btn number-btn" data-value="8">8</button>
            <button class="round-btn number-btn" data-value="9">9</button>
            <button class="round-btn orange-btn operator" data-value="&times;">
              &times;
            </button>

            <button class="round-btn number-btn" data-value="4">4</button>
            <button class="round-btn number-btn" data-value="5">5</button>
            <button class="round-btn number-btn" data-value="6">6</button>
            <button class="round-btn orange-btn operator" data-value="-">
              -
            </button>

            <button class="round-btn number-btn" data-value="1">1</button>
            <button class="round-btn number-btn" data-value="2">2</button>
            <button class="round-btn number-btn" data-value="3">3</button>
            <button class="round-btn orange-btn operator" data-value="+">
              +
            </button>

            <button class="round-btn" id="negation-btn">+/-</button>
            <button class="round-btn number-btn" id="zero" data-value="0">
              0
            </button>
            <button class="round-btn" id="comma" data-value=",">,</button>
            <button class="round-btn answer-btn">=</button>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
